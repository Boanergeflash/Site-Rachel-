  <body>
    <header>
      <img src="images /IMG_20260302_162010_565.jpg" alt="logo de rachelle" class="logo-form">

    </header>

    <main class="main">
  
      <form class="forme" action="" method="get">
        <fieldset class="form1">
          <legend class="legend">vos informations </legend><br>

          <label for="nom">   nom:</label>
          <input type="text" name="nom" id="nom" placeholder="ex: ngwem " class="form2" autofocus><br><br><br>

          <label for="prenom">prénom:</label>
          <input type="text" name="prenom" id="prenom" placeholder="ex:jean" class="form2"><br><br><br>

          <label for="téléphone">   tel:</label>
          <input type="tel" name="téléphone" id="telephone" placeholder="WhatsApp de préférable " class="form2"><br><br><br>

          <label for="e-mail">e-mail:</label>
          <input type="email" name="e-mail" id="e-mail" placeholder="ex:jeanngwem95@gmail.com" class="form2" required>

        </fieldset>
        <fieldset class="form1">
          <legend class="legend">packs disponibles</legend>
          <p class="form2">
            veillez faire le choix parmis les differentes propositions <br>
            <input type="radio" name="pack" value="starter" id="starter">
            <label for="starter">pack starter</label><br>

            <input type="radio" name="pack" value="pro" id="pro">
            <label for="pro">pack pro</label><br>

            <input type="radio" name="pack" value="premium" id="premium">
            <label for="premium">pack premium</label><br>

            <input type="radio" name="pack" value="carte" id="carte">
            <label for="carte">option à la carte</label>
          </p>

        </fieldset>
        <fieldset class="form1">
          <legend class="legend">votre avis</legend>

          <p class="form2">
            <label for="message">vôtre message</label><br>
            <textarea name="message" id="message" placeholder="un commentaire ou propositions " cols="40" rows="4"></textarea>
          </p>
          <input type="submit" value="envoyer" class="envoyer ">
          <div class="zoneafich">
            <em></em>
          </div>

        </fieldset>

      </form>

    </main>
